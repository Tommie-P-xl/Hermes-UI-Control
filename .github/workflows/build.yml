name: Build HermesUIControl

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pystray Pillow pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name HermesUIControl `
            --icon src\icon.ico `
            --paths src `
            --hidden-import pystray._win32 `
            --hidden-import PIL `
            --noconfirm `
            --clean `
            src\main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HermesUIControl
          path: dist/HermesUIControl.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: HermesUIControl
          path: dist/

      - name: Generate latest.json
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cat > dist/latest.json <<EOF
          {
            "version": "${TAG}",
            "notes": "Hermes UI Control ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/HermesUIControl.exe"
              }
            },
            "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/HermesUIControl.exe"
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HermesUIControl.exe
            dist/latest.json
          generate_release_notes: true
