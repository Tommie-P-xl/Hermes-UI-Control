name: Build HermesUIControl

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pystray Pillow pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name HermesUIControl `
            --icon src\icon.ico `
            --paths src `
            --hidden-import pystray._win32 `
            --hidden-import PIL `
            --noconfirm `
            --clean `
            src\main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HermesUIControl
          path: dist/HermesUIControl.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: HermesUIControl
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HermesUIControl.exe
          generate_release_notes: true
